<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Store Intelligence Dashboard</title>
  
  <!-- CDN dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  
  <style>
    :root {
      --bg: #0f0f0f; 
      --surface: #1a1a1a; 
      --border: #2a2a2a;
      --text: #e0e0e0; 
      --text-dim: #888; 
      --accent: #7cfc00;
      --info: #4fc3f7; 
      --warn: #ffb74d; 
      --critical: #ef5350;
      --font: 'Courier New', monospace;
    }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      margin: 0;
      padding: 20px;
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
    }
    
    .card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      padding: 15px;
      border-radius: 4px;
    }
    
    .severity-INFO { color: var(--info); }
    .severity-WARN { color: var(--warn); }
    .severity-CRITICAL { color: var(--critical); }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }
    
    .status-LIVE { color: var(--accent); }
    .status-DISCONNECTED { color: var(--critical); }
    .status-CONNECTING { color: var(--warn); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    window.API_BASE = "http://localhost:8000";
    window.STORE_ID = "STORE_BLR_002";

    const fmt = {
      num: (n) => (n == null ? "—" : n.toLocaleString()),
      pct: (p) => (p == null ? "—" : (p * 100).toFixed(1) + "%"),
      sec: (s) => (s == null ? "—" : Math.round(s) + "s"),
      time: (t) => {
        if (!t) return "—";
        const d = new Date(t);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }
    };

    function MetricsPanel({ metrics }) {
      if (!metrics) return <div className="loading">Awaiting live feed…</div>;

      const queueClass =
        metrics.current_queue_depth > 8 ? "severity-critical" :
        metrics.current_queue_depth > 5 ? "severity-warn" : "";

      return (
        <div className="dashboard-grid">

          {/* Unique Visitors */}
          <div className="card">
            <div className="card-title">Visitors Today</div>
            <div className="card-value">{fmt.num(metrics.unique_visitors)}</div>
            <div className="card-sub">
              <span className={`badge badge-${metrics.data_confidence.toLowerCase()}`}>
                {metrics.data_confidence}
              </span>
            </div>
          </div>

          {/* Conversion Rate */}
          <div className="card">
            <div className="card-title">Conversion Rate</div>
            <div className="card-value">{fmt.pct(metrics.conversion_rate)}</div>
            <div className="card-sub">
              {metrics.conversion_rate == null ? "No purchases yet" : "visitors → purchase"}
            </div>
          </div>

          {/* Queue Depth */}
          <div className={`card ${queueClass}`}>
            <div className="card-title">Billing Queue</div>
            <div className="card-value"
                 style={{ color: queueClass === "severity-critical" ?
                          "var(--critical)" : "var(--accent)" }}>
              {metrics.current_queue_depth}
            </div>
            <div className="card-sub">
              {metrics.current_queue_depth > 8 ? "⚠ Critical — add staff" :
               metrics.current_queue_depth > 5 ? "⚠ Queue building" :
               "Normal"}
            </div>
          </div>

          {/* Abandonment Rate */}
          <div className="card">
            <div className="card-title">Abandonment Rate</div>
            <div className="card-value">{fmt.pct(metrics.abandonment_rate)}</div>
            <div className="card-sub">billing queue exits</div>
          </div>

          {/* Top Dwell Zone */}
          <div className="card">
            <div className="card-title">Top Dwell Zone</div>
            <div className="card-value" style={{ fontSize: "1.2rem" }}>
              {metrics.avg_dwell_by_zone.length > 0
                ? metrics.avg_dwell_by_zone[0].zone_id
                : "—"}
            </div>
            <div className="card-sub">
              {metrics.avg_dwell_by_zone.length > 0
                ? `${fmt.sec(metrics.avg_dwell_by_zone[0].avg_dwell_sec)} avg`
                : "No dwell data"}
            </div>
          </div>

          {/* Last Updated */}
          <div className="card">
            <div className="card-title">Last Updated</div>
            <div className="card-value" style={{ fontSize: "1rem" }}>
              {fmt.time(metrics.as_of)}
            </div>
            <div className="card-sub">live via SSE</div>
          </div>

        </div>
      );
    }

    function VisitorTrendChart({ history }) {
      const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;

      return (
        <div className="dashboard-full card" style={{ height: 180 }}>
          <div className="card-title">Visitor Count — Live Trend (last 30 updates)</div>
          {history.length === 0
            ? <div className="loading">Collecting data…</div>
            : (
              <ResponsiveContainer width="100%" height={140}>
                <LineChart data={history}>
                  <XAxis
                    dataKey="t"
                    tick={{ fill: "var(--text-dim)", fontSize: 10 }}
                    interval="preserveStartEnd"
                  />
                  <YAxis
                    tick={{ fill: "var(--text-dim)", fontSize: 10 }}
                    allowDecimals={false}
                    width={32}
                  />
                  <Tooltip
                    contentStyle={{
                      background: "var(--surface)",
                      border: "1px solid var(--border)",
                      color: "var(--text)",
                      fontSize: 12,
                    }}
                  />
                  <Line
                    type="monotone"
                    dataKey="visitors"
                    stroke="var(--accent)"
                    strokeWidth={2}
                    dot={false}
                    isAnimationActive={false}
                  />
                </LineChart>
              </ResponsiveContainer>
            )
          }
        </div>
      );
    }
    
    function FunnelPanel({ storeId, apiBase }) {
      const [funnel, setFunnel]   = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError]     = React.useState(null);

      const { BarChart, Bar, XAxis, YAxis, Tooltip,
              ResponsiveContainer, Cell, LabelList } = Recharts;

      React.useEffect(() => {
        const fetchFunnel = async () => {
          try {
            const r = await fetch(`${apiBase}/stores/${storeId}/funnel`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            setFunnel(d.funnel || []);
            setError(null);
          } catch (e) {
            setError(e.message);
          } finally {
            setLoading(false);
          }
        };
        fetchFunnel();
        const id = setInterval(fetchFunnel, 30_000);
        return () => clearInterval(id);
      }, [storeId, apiBase]);

      // Colour gradient: entry (green) → purchase (yellow)
      const STAGE_COLORS = ["#7cfc00", "#4caf50", "#ffb74d", "#ff9800"];

      return (
        <div className="card">
          <div className="card-title">Conversion Funnel</div>

          {loading && <div className="loading">Loading funnel…</div>}
          {error   && <div style={{ color: "var(--critical)", fontSize: "0.8rem" }}>
            Error: {error}
          </div>}

          {funnel && funnel.length > 0 && (() => {
            const maxCount = Math.max(...funnel.map(s => s.count), 1);
            // Normalise counts to 0–100 for bar display
            const chartData = funnel.map(s => ({
              stage:      s.stage,
              bar:        Math.round((s.count / maxCount) * 100),
              count:      s.count,
              dropoff:    s.dropoff_pct,
            }));

            return (
              <>
                <ResponsiveContainer width="100%" height={160}>
                  <BarChart
                    data={chartData}
                    layout="vertical"
                    margin={{ top: 4, right: 60, left: 0, bottom: 4 }}
                  >
                    <XAxis type="number" hide domain={[0, 100]} />
                    <YAxis
                      type="category"
                      dataKey="stage"
                      width={90}
                      tick={{ fill: "var(--text)", fontSize: 11 }}
                    />
                    <Tooltip
                      formatter={(_, name, props) =>
                        [`${props.payload.count} visitors`, props.payload.stage]
                      }
                      contentStyle={{
                        background: "var(--surface)",
                        border: "1px solid var(--border)",
                        color: "var(--text)",
                        fontSize: 12,
                      }}
                    />
                    <Bar dataKey="bar" radius={[0, 3, 3, 0]}>
                      {chartData.map((entry, i) => (
                        <Cell key={i} fill={STAGE_COLORS[i] || "#7cfc00"} />
                      ))}
                      <LabelList
                        dataKey="count"
                        position="insideRight"
                        style={{ fill: "#000", fontSize: 10, fontWeight: "bold" }}
                      />
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>

                {/* Drop-off annotations */}
                <div style={{ fontSize: "0.7rem", marginTop: 4 }}>
                  {chartData.slice(1).map((s, i) => (
                    s.dropoff > 0 && (
                      <span key={i} style={{
                        color: s.dropoff > 50 ? "var(--critical)" : "var(--warn)",
                        marginRight: 10,
                      }}>
                        ↓ {s.dropoff}% at {s.stage}
                      </span>
                    )
                  ))}
                </div>
              </>
            );
          })()}

          {funnel && funnel.length === 0 &&
            <div className="loading">No funnel data yet</div>
          }
        </div>
      );
    }
    
    function HeatmapPanel({ storeId, apiBase }) {
      const [heatmap, setHeatmap] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError]     = React.useState(null);

      React.useEffect(() => {
        const fetchHeatmap = async () => {
          try {
            const r = await fetch(`${apiBase}/stores/${storeId}/heatmap`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            setHeatmap(d);
            setError(null);
          } catch (e) {
            setError(e.message);
          } finally {
            setLoading(false);
          }
        };
        fetchHeatmap();
        const id = setInterval(fetchHeatmap, 30_000);
        return () => clearInterval(id);
      }, [storeId, apiBase]);

      // Maps normalised_score (0–100) to a CSS background colour.
      // 0   = cool blue  (hsl 240 50% 20%)
      // 50  = warm amber (hsl 30  80% 30%)
      // 100 = hot red    (hsl 0   90% 35%)
      const scoreToColor = (score) => {
        const hue = Math.round(240 - (score / 100) * 240);
        const sat = Math.round(50  + (score / 100) * 40);
        const lit = Math.round(20  + (score / 100) * 15);
        return `hsl(${hue}, ${sat}%, ${lit}%)`;
      };

      const textColor = (score) => score > 60 ? "#fff" : "var(--text)";

      return (
        <div className="card" style={{ gridColumn: "span 2" }}>
          <div className="card-title">Zone Heatmap</div>

          {loading && <div className="loading">Loading heatmap…</div>}
          {error   && <div style={{ color: "var(--critical)", fontSize: "0.8rem" }}>
            Error: {error}
          </div>}

          {heatmap && (
            <>
              {heatmap.data_confidence === "LOW" && (
                <div style={{
                  background: "#4a3000",
                  color: "var(--warn)",
                  fontSize: "0.7rem",
                  padding: "4px 8px",
                  borderRadius: 3,
                  marginBottom: 8,
                }}>
                  ⚠ Low confidence — fewer than 20 sessions today
                </div>
              )}

              {heatmap.zones.length === 0
                ? <div className="loading">No zone data yet</div>
                : (
                  <div style={{
                    display: "grid",
                    gridTemplateColumns: "repeat(auto-fill, minmax(90px, 1fr))",
                    gap: 6,
                    marginTop: 6,
                  }}>
                    {heatmap.zones.map((zone) => (
                      <div key={zone.zone_id} style={{
                        background:   scoreToColor(zone.normalised_score),
                        color:        textColor(zone.normalised_score),
                        borderRadius: 4,
                        padding:      "8px 6px",
                        textAlign:    "center",
                        cursor:       "default",
                      }}
                      title={`${zone.zone_id}: ${zone.visit_count} visits, ${zone.avg_dwell_sec}s avg dwell`}
                      >
                        <div style={{ fontSize: "0.65rem", fontWeight: "bold",
                                      letterSpacing: "0.03em", marginBottom: 3 }}>
                          {zone.zone_id}
                        </div>
                        <div style={{ fontSize: "1rem", fontWeight: "bold",
                                      lineHeight: 1 }}>
                          {zone.visit_count}
                        </div>
                        <div style={{ fontSize: "0.6rem", opacity: 0.85,
                                      marginTop: 2 }}>
                          {fmt.sec(zone.avg_dwell_sec)}
                        </div>
                      </div>
                    ))}
                  </div>
                )
              }

              <div style={{ fontSize: "0.65rem", color: "var(--text-dim)",
                            marginTop: 8, textAlign: "right" }}>
                {fmt.time(heatmap.as_of)}
              </div>
            </>
          )}
        </div>
      );
    }
    
    function AnomalyPanel({ anomalies }) {
      const SEVERITY_META = {
        CRITICAL: { icon: "🚨", cls: "severity-critical", label: "CRITICAL" },
        WARN:     { icon: "⚠",  cls: "severity-warn",     label: "WARNING"  },
        INFO:     { icon: "ℹ",  cls: "severity-info",     label: "INFO"     },
      };

      const criticalCount = anomalies.filter(a => a.severity === "CRITICAL").length;
      const warnCount     = anomalies.filter(a => a.severity === "WARN").length;

      return (
        <div className="dashboard-full">

          {/* Panel header */}
          <div style={{
            display: "flex",
            alignItems: "center",
            gap: 12,
            marginBottom: 8,
          }}>
            <span style={{ fontSize: "0.7rem", color: "var(--text-dim)",
                           textTransform: "uppercase", letterSpacing: "0.05em" }}>
              Active Anomalies
            </span>
            {criticalCount > 0 && (
              <span style={{ background: "var(--critical)", color: "#fff",
                             fontSize: "0.65rem", fontWeight: "bold",
                             padding: "2px 8px", borderRadius: 3 }}>
                {criticalCount} CRITICAL
              </span>
            )}
            {warnCount > 0 && (
              <span style={{ background: "var(--warn)", color: "#000",
                             fontSize: "0.65rem", fontWeight: "bold",
                             padding: "2px 8px", borderRadius: 3 }}>
                {warnCount} WARN
              </span>
            )}
          </div>

          {/* All clear */}
          {anomalies.length === 0 && (
            <div style={{
              background: "#0a2e0a",
              border: "1px solid #2e7d32",
              borderRadius: 6,
              padding: "12px 16px",
              color: "var(--accent)",
              fontSize: "0.85rem",
            }}>
              ✓ All clear — no active anomalies
            </div>
          )}

          {/* Anomaly cards */}
          {anomalies.length > 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {anomalies.map((anomaly, i) => {
                const meta = SEVERITY_META[anomaly.severity] ||
                             SEVERITY_META["INFO"];

                return (
                  <div key={`${anomaly.anomaly_id}-${i}`}
                       className={`card ${meta.cls}`}
                       style={{ display: "flex", gap: 16, alignItems: "flex-start" }}
                  >
                    {/* Icon */}
                    <div style={{ fontSize: "1.4rem", lineHeight: 1,
                                  minWidth: 24, paddingTop: 2 }}>
                      {meta.icon}
                    </div>

                    {/* Body */}
                    <div style={{ flex: 1 }}>
                      <div style={{
                        display: "flex", alignItems: "center",
                        gap: 8, marginBottom: 4,
                      }}>
                        <span style={{ fontWeight: "bold", fontSize: "0.85rem" }}>
                          {anomaly.anomaly_id}
                        </span>
                        <span style={{
                          fontSize: "0.65rem", fontWeight: "bold",
                          padding: "1px 6px", borderRadius: 2,
                          background: meta.cls === "severity-critical" ?
                            "var(--critical)" :
                            meta.cls === "severity-warn" ?
                            "var(--warn)" : "var(--info)",
                          color: "#000",
                        }}>
                          {meta.label}
                        </span>
                        {anomaly.zone_id && (
                          <span style={{ fontSize: "0.7rem",
                                         color: "var(--text-dim)" }}>
                            Zone: {anomaly.zone_id}
                          </span>
                        )}
                      </div>

                      {/* Value context */}
                      {anomaly.value != null && (
                        <div style={{ fontSize: "0.75rem",
                                      color: "var(--text-dim)", marginBottom: 4 }}>
                          Current: {anomaly.value}
                          {anomaly.threshold != null && ` (threshold: ${anomaly.threshold})`}
                          {anomaly.drop_pct  != null && ` (↓${anomaly.drop_pct}% vs 7-day avg)`}
                        </div>
                      )}

                      {/* Suggested action */}
                      <div style={{ fontSize: "0.8rem", color: "var(--text)",
                                    lineHeight: 1.5 }}>
                        {anomaly.suggested_action}
                      </div>
                    </div>

                    {/* Timestamp */}
                    <div style={{ fontSize: "0.65rem", color: "var(--text-dim)",
                                  whiteSpace: "nowrap", paddingTop: 2 }}>
                      {fmt.time(anomaly.detected_at)}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    const Header = ({ storeId, status }) => (
      <header>
        <h2>Store: {storeId}</h2>
        <div className={`status-${status}`}>● SSE: {status}</div>
      </header>
    );

    const Dashboard = () => {
      const [sseStatus, setSseStatus] = React.useState("CONNECTING");
      const [metrics, setMetrics] = React.useState(null);
      const [anomalies, setAnomalies] = React.useState([]);
      const [history, setHistory] = React.useState([]);

      // SSE Connection
      React.useEffect(() => {
        const es = new EventSource(`${window.API_BASE}/stores/${window.STORE_ID}/metrics/stream`);
        es.onopen    = () => setSseStatus("LIVE");
        es.onmessage = (e) => { 
          const d = JSON.parse(e.data); 
          setMetrics(d);
          setHistory(prev => {
            const t = new Date(d.as_of || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const next = [...prev, { t, visitors: d.unique_visitors }];
            return next.length > 30 ? next.slice(next.length - 30) : next;
          });
        };
        es.onerror   = () => setSseStatus("DISCONNECTED");
        return () => es.close();
      }, []);

      // Anomaly Poll
      React.useEffect(() => {
        const poll = async () => {
          try {
            const r = await fetch(`${window.API_BASE}/stores/${window.STORE_ID}/anomalies`);
            const d = await r.json();
            setAnomalies(d.anomalies || []);
          } catch (e) {
            console.error("Anomaly fetch error", e);
          }
        };
        poll();
        const id = setInterval(poll, 15000);
        return () => clearInterval(id);
      }, []);

      return (
        <div>
          <Header storeId={window.STORE_ID} status={sseStatus} />
          
          <div className="dashboard-grid">
            <MetricsPanel metrics={metrics} />
            <VisitorTrendChart history={history} />
            <FunnelPanel storeId={window.STORE_ID} apiBase={window.API_BASE} />
            <HeatmapPanel storeId={window.STORE_ID} apiBase={window.API_BASE} />
            <AnomalyPanel anomalies={anomalies} />
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
