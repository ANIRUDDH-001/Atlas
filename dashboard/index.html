<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Intelligence Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script>
    window.onerror = function(msg, url, line, col, error) {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a0000;color:#ff4444;font-family:monospace;font-size:14px;padding:20px;border-bottom:2px solid #ff4444;white-space:pre-wrap;max-height:40vh;overflow:auto;';
      el.textContent = '⚠ Runtime Error: ' + msg + '\nLine: ' + line + '\n' + (error ? error.stack : '');
      document.body.prepend(el);
    };
  </script>

  <script src="https://unpkg.com/react@17.0.2/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@1.8.5/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #06060f;
      --bg-base: #0a0a1a;
      --bg-surface: #0f1023;
      --glass-bg: rgba(15, 16, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-highlight: rgba(255, 255, 255, 0.03);
      --text-primary: #f0f0f8;
      --text-secondary: #a0a0b8;
      --text-muted: #606078;
      --blue: #3b82f6;
      --blue-glow: rgba(59, 130, 246, 0.15);
      --emerald: #10b981;
      --emerald-glow: rgba(16, 185, 129, 0.15);
      --amber: #f59e0b;
      --amber-glow: rgba(245, 158, 11, 0.15);
      --rose: #f43f5e;
      --rose-glow: rgba(244, 63, 94, 0.15);
      --purple: #8b5cf6;
      --purple-glow: rgba(139, 92, 246, 0.15);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background effects */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.04) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.03) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 50%, rgba(16,185,129,0.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    /* Glass card base */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .glass:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.3);
      border-color: rgba(255,255,255,0.1);
    }

    /* Pulsing live indicator */
    @keyframes pulse-live {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    }

    @keyframes pulse-reconnect {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .animate-in {
      animation: fadeInUp 0.4s ease-out both;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* Responsive */
    @media (max-width: 1024px) {
      .main-grid { grid-template-columns: 1fr !important; }
      .bottom-grid { grid-template-columns: 1fr !important; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }

    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr !important; }
      .dashboard-wrap { padding: 12px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    /* ── Global error handler (inside Babel too) ── */
    window.onerror = function(msg, url, line, col, error) {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a0000;color:#ff4444;font-family:monospace;font-size:14px;padding:20px;border-bottom:2px solid #ff4444;white-space:pre-wrap;';
      el.textContent = '⚠ Runtime Error: ' + msg + '\n' + (error ? error.stack : '');
      document.body.prepend(el);
    };

    /* ── Config ── */
    window.API_BASE = window.API_BASE || (window.location.protocol + "//" + window.location.hostname + ":8000");
    window.STORE_ID = window.STORE_ID || "STORE_ST1008";

    /* ── Recharts destructure ── */
    const {
      LineChart, Line, AreaChart, Area, BarChart, Bar,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell
    } = Recharts;

    /* ── Formatters ── */
    const fmt = {
      num: (n) => (n == null ? "—" : n.toLocaleString()),
      pct: (p) => (p == null ? "—" : (p * 100).toFixed(1) + "%"),
      sec: (s) => (s == null ? "—" : Math.round(s) + "s"),
      time: (t) => {
        if (!t) return "—";
        const d = new Date(t);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      },
      storeName: (id) => {
        if (!id) return "Store";
        return id.replace(/^STORE_/, '').replace(/_/g, ' ').replace(/ST(\d+)/, 'Store #$1');
      },
      date: () => {
        return new Date().toLocaleDateString('en-US', {
          weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });
      }
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HEADER COMPONENT
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const Header = ({ storeId, status, lastUpdate }) => {
      const isLive = status === "LIVE";
      const isConnecting = status === "CONNECTING" || status === "RECONNECTING…";

      return (
        <div style={{
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'space-between',
          padding: '20px 0',
          borderBottom: '1px solid var(--glass-border)',
          marginBottom: '24px',
          flexWrap: 'wrap',
          gap: '12px',
        }}>
          {/* Left: Logo & store name */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
            <div style={{
              width: 42, height: 42,
              borderRadius: 12,
              background: 'linear-gradient(135deg, var(--blue), var(--purple))',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '20px',
              boxShadow: '0 4px 16px rgba(59,130,246,0.3)',
            }}>
              📊
            </div>
            <div>
              <h1 style={{
                fontSize: '20px', fontWeight: 700,
                color: 'var(--text-primary)',
                letterSpacing: '-0.02em',
                lineHeight: 1.2,
              }}>
                {fmt.storeName(storeId)}
              </h1>
              <div style={{
                fontSize: '12px', color: 'var(--text-muted)',
                fontWeight: 400, marginTop: '2px',
              }}>
                Intelligence Dashboard
              </div>
            </div>
          </div>

          {/* Center: Date */}
          <div style={{
            fontSize: '13px', color: 'var(--text-secondary)',
            fontWeight: 400,
          }}>
            {fmt.date()}
          </div>

          {/* Right: Status */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: '8px',
            padding: '6px 14px',
            borderRadius: '20px',
            background: isLive ? 'rgba(16,185,129,0.1)' : isConnecting ? 'rgba(245,158,11,0.1)' : 'rgba(244,63,94,0.1)',
            border: `1px solid ${isLive ? 'rgba(16,185,129,0.2)' : isConnecting ? 'rgba(245,158,11,0.2)' : 'rgba(244,63,94,0.2)'}`,
          }}>
            <div style={{
              width: 8, height: 8, borderRadius: '50%',
              background: isLive ? 'var(--emerald)' : isConnecting ? 'var(--amber)' : 'var(--rose)',
              animation: isLive ? 'pulse-live 2s ease-in-out infinite' : isConnecting ? 'pulse-reconnect 1.5s ease-in-out infinite' : 'none',
            }} />
            <span style={{
              fontSize: '12px', fontWeight: 600,
              color: isLive ? 'var(--emerald)' : isConnecting ? 'var(--amber)' : 'var(--rose)',
              textTransform: 'uppercase',
              letterSpacing: '0.04em',
            }}>
              {isLive ? 'Live' : status}
            </span>
            {lastUpdate && (
              <span style={{ fontSize: '11px', color: 'var(--text-muted)', marginLeft: '4px' }}>
                · {lastUpdate}
              </span>
            )}
          </div>
        </div>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       KPI CARD COMPONENT
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const KPICard = ({ icon, label, value, subtitle, color, glowColor, delay }) => (
      <div className="glass animate-in" style={{
        padding: '22px 24px',
        position: 'relative',
        overflow: 'hidden',
        animationDelay: `${delay}ms`,
      }}>
        {/* Glow accent */}
        <div style={{
          position: 'absolute',
          top: 0, left: 0, right: 0, height: '2px',
          background: `linear-gradient(90deg, transparent, ${color}, transparent)`,
          opacity: 0.8,
        }} />

        <div style={{
          display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between',
        }}>
          <div>
            <div style={{
              fontSize: '12px', fontWeight: 500,
              color: 'var(--text-muted)',
              textTransform: 'uppercase',
              letterSpacing: '0.06em',
              marginBottom: '10px',
            }}>
              {label}
            </div>
            <div style={{
              fontSize: '32px', fontWeight: 800,
              color: 'var(--text-primary)',
              letterSpacing: '-0.03em',
              lineHeight: 1,
              marginBottom: '6px',
            }}>
              {value}
            </div>
            {subtitle && (
              <div style={{
                fontSize: '12px', color: 'var(--text-secondary)',
                fontWeight: 400,
              }}>
                {subtitle}
              </div>
            )}
          </div>
          <div style={{
            fontSize: '28px',
            width: 48, height: 48,
            borderRadius: 12,
            background: glowColor,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            flexShrink: 0,
          }}>
            {icon}
          </div>
        </div>
      </div>
    );

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       KPI ROW
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const KPIRow = ({ metrics }) => {
      const visitors = metrics ? fmt.num(metrics.unique_visitors) : "—";
      const conversion = metrics ? fmt.pct(metrics.conversion_rate) : "—";
      const avgDwell = metrics && metrics.avg_dwell_by_zone && metrics.avg_dwell_by_zone.length > 0
        ? fmt.sec(metrics.avg_dwell_by_zone.reduce((sum, z) => sum + z.avg_dwell_sec, 0) / metrics.avg_dwell_by_zone.length)
        : "—";
      const queue = metrics ? metrics.current_queue_depth : "—";
      const queueStatus = metrics
        ? (metrics.current_queue_depth > 8 ? "⚠ Critical" : metrics.current_queue_depth > 5 ? "Building up" : "Normal flow")
        : "";
      const confidence = metrics ? metrics.data_confidence : "";

      return (
        <div className="kpi-grid" style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(4, 1fr)',
          gap: '16px',
          marginBottom: '20px',
        }}>
          <KPICard
            icon="👥" label="Total Visitors" value={visitors}
            subtitle={confidence ? `Confidence: ${confidence}` : ""}
            color="var(--blue)" glowColor="var(--blue-glow)" delay={0}
          />
          <KPICard
            icon="💰" label="Conversion Rate" value={conversion}
            subtitle={metrics && metrics.conversion_rate != null ? "Visitors → Purchase" : "No data yet"}
            color="var(--emerald)" glowColor="var(--emerald-glow)" delay={60}
          />
          <KPICard
            icon="⏱️" label="Avg Dwell Time" value={avgDwell}
            subtitle="Across all zones"
            color="var(--purple)" glowColor="var(--purple-glow)" delay={120}
          />
          <KPICard
            icon="🛒" label="Billing Queue" value={String(queue)}
            subtitle={queueStatus}
            color={metrics && metrics.current_queue_depth > 8 ? "var(--rose)" : "var(--amber)"}
            glowColor={metrics && metrics.current_queue_depth > 8 ? "var(--rose-glow)" : "var(--amber-glow)"}
            delay={180}
          />
        </div>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       VISITOR TREND CHART
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const VisitorTrendChart = ({ history }) => {
      return (
        <div className="glass animate-in" style={{
          padding: '24px', height: '100%', minHeight: 340,
          animationDelay: '200ms',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: '20px',
          }}>
            <div>
              <div style={{
                fontSize: '15px', fontWeight: 600,
                color: 'var(--text-primary)',
              }}>
                Visitor Trend
              </div>
              <div style={{
                fontSize: '12px', color: 'var(--text-muted)', marginTop: '2px',
              }}>
                Live count · Last {history.length} updates
              </div>
            </div>
            <div style={{
              padding: '4px 10px', borderRadius: '6px',
              background: 'var(--blue-glow)',
              border: '1px solid rgba(59,130,246,0.15)',
              fontSize: '11px', fontWeight: 600, color: 'var(--blue)',
            }}>
              REAL-TIME
            </div>
          </div>

          {history.length === 0 ? (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              height: '220px', color: 'var(--text-muted)', fontSize: '14px',
            }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: '32px', marginBottom: '8px', opacity: 0.5 }}>📈</div>
                Collecting data points…
              </div>
            </div>
          ) : (
            <ResponsiveContainer width="100%" height={250}>
              <AreaChart data={history} margin={{ top: 5, right: 10, left: -10, bottom: 0 }}>
                <defs>
                  <linearGradient id="visitorGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor="#3b82f6" stopOpacity={0.3} />
                    <stop offset="95%" stopColor="#3b82f6" stopOpacity={0.0} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                <XAxis
                  dataKey="t"
                  tick={{ fill: '#606078', fontSize: 10, fontFamily: 'Inter' }}
                  axisLine={{ stroke: 'rgba(255,255,255,0.06)' }}
                  tickLine={false}
                  interval="preserveStartEnd"
                />
                <YAxis
                  tick={{ fill: '#606078', fontSize: 10, fontFamily: 'Inter' }}
                  axisLine={{ stroke: 'rgba(255,255,255,0.06)' }}
                  tickLine={false}
                  allowDecimals={false}
                  width={36}
                />
                <Tooltip
                  contentStyle={{
                    background: 'rgba(15,16,42,0.95)',
                    border: '1px solid rgba(255,255,255,0.1)',
                    borderRadius: '10px',
                    color: '#f0f0f8',
                    fontSize: '12px',
                    fontFamily: 'Inter',
                    boxShadow: '0 8px 32px rgba(0,0,0,0.4)',
                    padding: '10px 14px',
                  }}
                  labelStyle={{ color: '#a0a0b8', fontSize: '11px', marginBottom: '4px' }}
                />
                <Area
                  type="monotone"
                  dataKey="visitors"
                  stroke="#3b82f6"
                  strokeWidth={2.5}
                  fill="url(#visitorGradient)"
                  dot={false}
                  activeDot={{ r: 5, fill: '#3b82f6', stroke: '#0a0a1a', strokeWidth: 2 }}
                  isAnimationActive={false}
                />
              </AreaChart>
            </ResponsiveContainer>
          )}
        </div>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONVERSION FUNNEL
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const ConversionFunnel = ({ storeId, apiBase }) => {
      const [funnel, setFunnel] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);

      React.useEffect(() => {
        const fetchFunnel = async () => {
          try {
            const r = await fetch(`${apiBase}/stores/${storeId}/funnel`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            setFunnel(d.funnel || []);
            setError(null);
          } catch (e) { setError(e.message); }
          finally { setLoading(false); }
        };
        fetchFunnel();
        const id = setInterval(fetchFunnel, 30000);
        return () => clearInterval(id);
      }, [storeId, apiBase]);

      const FUNNEL_COLORS = ['#3b82f6', '#8b5cf6', '#f59e0b', '#10b981'];
      const FUNNEL_ICONS = ['🚪', '👀', '🛍️', '💳'];

      return (
        <div className="glass animate-in" style={{
          padding: '24px', height: '100%', minHeight: 340,
          animationDelay: '260ms',
        }}>
          <div style={{
            fontSize: '15px', fontWeight: 600,
            color: 'var(--text-primary)',
            marginBottom: '4px',
          }}>
            Conversion Funnel
          </div>
          <div style={{
            fontSize: '12px', color: 'var(--text-muted)', marginBottom: '20px',
          }}>
            Visitor journey stages
          </div>

          {loading && (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              height: '220px', color: 'var(--text-muted)', fontSize: '14px',
            }}>Loading funnel data…</div>
          )}

          {error && (
            <div style={{
              padding: '10px 14px', borderRadius: '8px',
              background: 'var(--rose-glow)', border: '1px solid rgba(244,63,94,0.2)',
              color: 'var(--rose)', fontSize: '12px',
            }}>
              Error: {error}
            </div>
          )}

          {funnel && funnel.length > 0 && (() => {
            const maxCount = Math.max(...funnel.map(s => s.count), 1);

            return (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                {funnel.map((stage, i) => {
                  const pct = (stage.count / maxCount) * 100;
                  const color = FUNNEL_COLORS[i] || FUNNEL_COLORS[0];
                  const icon = FUNNEL_ICONS[i] || '📍';

                  return (
                    <div key={i}>
                      {/* Stage row */}
                      <div style={{
                        display: 'flex', alignItems: 'center', gap: '10px',
                        marginBottom: '4px',
                      }}>
                        <span style={{ fontSize: '16px', width: 24, textAlign: 'center' }}>{icon}</span>
                        <span style={{
                          fontSize: '12px', fontWeight: 600,
                          color: 'var(--text-secondary)',
                          flex: 1,
                          textTransform: 'capitalize',
                        }}>
                          {stage.stage}
                        </span>
                        <span style={{
                          fontSize: '14px', fontWeight: 700,
                          color: 'var(--text-primary)',
                        }}>
                          {fmt.num(stage.count)}
                        </span>
                      </div>

                      {/* Bar */}
                      <div style={{
                        height: '28px',
                        background: 'rgba(255,255,255,0.03)',
                        borderRadius: '6px',
                        overflow: 'hidden',
                        position: 'relative',
                        marginLeft: '34px',
                      }}>
                        <div style={{
                          width: `${Math.max(pct, 3)}%`,
                          height: '100%',
                          background: `linear-gradient(90deg, ${color}, ${color}dd)`,
                          borderRadius: '6px',
                          transition: 'width 0.6s ease-out',
                          display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
                          paddingRight: '10px',
                          boxShadow: `0 0 16px ${color}33`,
                        }}>
                          <span style={{
                            fontSize: '10px', fontWeight: 700,
                            color: '#fff',
                            textShadow: '0 1px 3px rgba(0,0,0,0.5)',
                          }}>
                            {Math.round(pct)}%
                          </span>
                        </div>
                      </div>

                      {/* Drop-off indicator */}
                      {stage.dropoff_pct > 0 && i > 0 && (
                        <div style={{
                          marginLeft: '34px', marginTop: '2px',
                          fontSize: '10px', fontWeight: 500,
                          color: stage.dropoff_pct > 50 ? 'var(--rose)' : 'var(--amber)',
                        }}>
                          ↓ {stage.dropoff_pct}% drop-off
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })()}

          {funnel && funnel.length === 0 && (
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              height: '220px', color: 'var(--text-muted)', fontSize: '14px',
            }}>
              No funnel data yet
            </div>
          )}
        </div>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ZONE HEATMAP
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const ZoneHeatmap = ({ storeId, apiBase }) => {
      const [heatmap, setHeatmap] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);

      React.useEffect(() => {
        const fetchHeatmap = async () => {
          try {
            const r = await fetch(`${apiBase}/stores/${storeId}/heatmap`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            setHeatmap(d);
            setError(null);
          } catch (e) { setError(e.message); }
          finally { setLoading(false); }
        };
        fetchHeatmap();
        const id = setInterval(fetchHeatmap, 30000);
        return () => clearInterval(id);
      }, [storeId, apiBase]);

      const scoreToColor = (score) => {
        // green (low) → yellow (medium) → red (high)
        if (score <= 50) {
          const r = Math.round(16 + (score / 50) * (245 - 16));
          const g = Math.round(185 + (score / 50) * (158 - 185));
          const b = Math.round(129 + (score / 50) * (11 - 129));
          return `rgb(${r},${g},${b})`;
        } else {
          const r = Math.round(245 + ((score - 50) / 50) * (244 - 245));
          const g = Math.round(158 - ((score - 50) / 50) * (158 - 63));
          const b = Math.round(11 + ((score - 50) / 50) * (94 - 11));
          return `rgb(${r},${g},${b})`;
        }
      };

      const scoreToBgAlpha = (score) => {
        return 0.08 + (score / 100) * 0.18;
      };

      return (
        <div className="glass animate-in" style={{
          padding: '24px', minHeight: 260,
          animationDelay: '320ms',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: '4px',
          }}>
            <div style={{
              fontSize: '15px', fontWeight: 600,
              color: 'var(--text-primary)',
            }}>
              Zone Heatmap
            </div>
            {heatmap && (
              <div style={{
                fontSize: '11px', color: 'var(--text-muted)',
              }}>
                Updated {fmt.time(heatmap.as_of)}
              </div>
            )}
          </div>
          <div style={{
            fontSize: '12px', color: 'var(--text-muted)', marginBottom: '16px',
          }}>
            Traffic intensity by zone
          </div>

          {/* Legend */}
          <div style={{
            display: 'flex', alignItems: 'center', gap: '6px',
            marginBottom: '14px', fontSize: '10px', color: 'var(--text-muted)',
          }}>
            <span>Low</span>
            <div style={{
              height: 6, flex: 1, maxWidth: 120,
              borderRadius: 3,
              background: 'linear-gradient(90deg, #10b981, #f59e0b, #f43f5e)',
            }} />
            <span>High</span>
          </div>

          {loading && (
            <div style={{ color: 'var(--text-muted)', fontSize: '13px', padding: '20px 0' }}>
              Loading heatmap…
            </div>
          )}

          {error && (
            <div style={{
              padding: '10px 14px', borderRadius: '8px',
              background: 'var(--rose-glow)', border: '1px solid rgba(244,63,94,0.2)',
              color: 'var(--rose)', fontSize: '12px',
            }}>
              Error: {error}
            </div>
          )}

          {heatmap && (
            <>
              {heatmap.data_confidence === "LOW" && (
                <div style={{
                  padding: '8px 12px', borderRadius: '8px',
                  background: 'var(--amber-glow)',
                  border: '1px solid rgba(245,158,11,0.15)',
                  color: 'var(--amber)', fontSize: '11px', fontWeight: 500,
                  marginBottom: '12px',
                }}>
                  ⚠ Low confidence — fewer than 20 sessions today
                </div>
              )}

              {heatmap.zones && heatmap.zones.length === 0 ? (
                <div style={{ color: 'var(--text-muted)', fontSize: '13px', padding: '20px 0' }}>
                  No zone data yet
                </div>
              ) : (
                <div style={{
                  display: 'grid',
                  gridTemplateColumns: 'repeat(auto-fill, minmax(110px, 1fr))',
                  gap: '8px',
                }}>
                  {heatmap.zones && heatmap.zones.map((zone) => {
                    const color = scoreToColor(zone.normalised_score);
                    return (
                      <div key={zone.zone_id} style={{
                        background: `rgba(${color.match(/\d+/g).join(',')}, ${scoreToBgAlpha(zone.normalised_score)})`,
                        border: `1px solid ${color}33`,
                        borderRadius: '10px',
                        padding: '14px 10px',
                        textAlign: 'center',
                        cursor: 'default',
                        transition: 'transform 0.15s ease, box-shadow 0.15s ease',
                        position: 'relative',
                        overflow: 'hidden',
                      }}
                      title={`${zone.zone_id}: ${zone.visit_count} visits, ${zone.avg_dwell_sec}s avg dwell, score: ${zone.normalised_score}`}
                      onMouseOver={(e) => { e.currentTarget.style.transform = 'scale(1.04)'; e.currentTarget.style.boxShadow = `0 4px 16px ${color}22`; }}
                      onMouseOut={(e) => { e.currentTarget.style.transform = 'scale(1)'; e.currentTarget.style.boxShadow = 'none'; }}
                      >
                        {/* Intensity dot */}
                        <div style={{
                          position: 'absolute', top: 8, right: 8,
                          width: 6, height: 6, borderRadius: '50%',
                          background: color,
                          boxShadow: `0 0 8px ${color}88`,
                        }} />

                        <div style={{
                          fontSize: '10px', fontWeight: 700,
                          color: 'var(--text-secondary)',
                          textTransform: 'uppercase',
                          letterSpacing: '0.05em',
                          marginBottom: '6px',
                        }}>
                          {zone.zone_id}
                        </div>
                        <div style={{
                          fontSize: '22px', fontWeight: 800,
                          color: color,
                          lineHeight: 1,
                          marginBottom: '4px',
                        }}>
                          {zone.visit_count}
                        </div>
                        <div style={{
                          fontSize: '10px', color: 'var(--text-muted)',
                          fontWeight: 500,
                        }}>
                          {fmt.sec(zone.avg_dwell_sec)} dwell
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}
        </div>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ANOMALY FEED
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const AnomalyFeed = ({ anomalies }) => {
      const SEVERITY_META = {
        CRITICAL: { icon: '🚨', color: 'var(--rose)', bg: 'var(--rose-glow)', borderColor: 'rgba(244,63,94,0.2)', label: 'CRITICAL' },
        WARN:     { icon: '⚠️', color: 'var(--amber)', bg: 'var(--amber-glow)', borderColor: 'rgba(245,158,11,0.2)', label: 'WARNING' },
        INFO:     { icon: 'ℹ️', color: 'var(--blue)', bg: 'var(--blue-glow)', borderColor: 'rgba(59,130,246,0.2)', label: 'INFO' },
      };

      const criticalCount = anomalies.filter(a => a.severity === "CRITICAL").length;
      const warnCount = anomalies.filter(a => a.severity === "WARN").length;

      return (
        <div className="glass animate-in" style={{
          padding: '24px', minHeight: 260,
          animationDelay: '380ms',
        }}>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            marginBottom: '4px',
          }}>
            <div style={{
              fontSize: '15px', fontWeight: 600,
              color: 'var(--text-primary)',
            }}>
              Active Anomalies
            </div>
            <div style={{ display: 'flex', gap: '6px' }}>
              {criticalCount > 0 && (
                <span style={{
                  padding: '3px 8px', borderRadius: '6px',
                  background: 'var(--rose)', color: '#fff',
                  fontSize: '10px', fontWeight: 700,
                }}>
                  {criticalCount} CRITICAL
                </span>
              )}
              {warnCount > 0 && (
                <span style={{
                  padding: '3px 8px', borderRadius: '6px',
                  background: 'var(--amber)', color: '#000',
                  fontSize: '10px', fontWeight: 700,
                }}>
                  {warnCount} WARN
                </span>
              )}
            </div>
          </div>
          <div style={{
            fontSize: '12px', color: 'var(--text-muted)', marginBottom: '16px',
          }}>
            Real-time alerts & notifications
          </div>

          {/* All clear state */}
          {anomalies.length === 0 && (
            <div style={{
              padding: '24px',
              borderRadius: '10px',
              background: 'var(--emerald-glow)',
              border: '1px solid rgba(16,185,129,0.15)',
              textAlign: 'center',
            }}>
              <div style={{ fontSize: '28px', marginBottom: '8px' }}>✅</div>
              <div style={{
                fontSize: '14px', fontWeight: 600,
                color: 'var(--emerald)',
              }}>
                All Clear
              </div>
              <div style={{
                fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px',
              }}>
                No active anomalies detected
              </div>
            </div>
          )}

          {/* Anomaly list */}
          {anomalies.length > 0 && (
            <div style={{
              display: 'flex', flexDirection: 'column', gap: '8px',
              maxHeight: '300px', overflowY: 'auto',
              paddingRight: '4px',
            }}>
              {anomalies.map((anomaly, i) => {
                const meta = SEVERITY_META[anomaly.severity] || SEVERITY_META.INFO;

                return (
                  <div key={`${anomaly.anomaly_id}-${i}`} style={{
                    padding: '12px 14px',
                    borderRadius: '10px',
                    background: meta.bg,
                    border: `1px solid ${meta.borderColor}`,
                  }}>
                    {/* Header row */}
                    <div style={{
                      display: 'flex', alignItems: 'center', gap: '8px',
                      marginBottom: '6px',
                    }}>
                      <span style={{ fontSize: '14px' }}>{meta.icon}</span>
                      <span style={{
                        fontSize: '12px', fontWeight: 700,
                        color: meta.color,
                        flex: 1,
                      }}>
                        {anomaly.anomaly_id}
                      </span>
                      <span style={{
                        padding: '2px 6px', borderRadius: '4px',
                        background: meta.color, color: anomaly.severity === 'WARN' ? '#000' : '#fff',
                        fontSize: '9px', fontWeight: 800,
                        letterSpacing: '0.04em',
                      }}>
                        {meta.label}
                      </span>
                    </div>

                    {/* Value context */}
                    {anomaly.value != null && (
                      <div style={{
                        fontSize: '11px', color: 'var(--text-secondary)',
                        marginBottom: '4px',
                      }}>
                        Current: {anomaly.value}
                        {anomaly.threshold != null && ` · Threshold: ${anomaly.threshold}`}
                        {anomaly.drop_pct != null && ` · ↓${anomaly.drop_pct}%`}
                      </div>
                    )}

                    {/* Action */}
                    <div style={{
                      fontSize: '11px', color: 'var(--text-secondary)',
                      lineHeight: 1.5,
                    }}>
                      {anomaly.suggested_action}
                    </div>

                    {/* Footer: zone + time */}
                    <div style={{
                      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                      marginTop: '6px', paddingTop: '6px',
                      borderTop: '1px solid rgba(255,255,255,0.04)',
                    }}>
                      {anomaly.zone_id && (
                        <span style={{
                          fontSize: '10px', color: 'var(--text-muted)',
                          padding: '1px 6px', borderRadius: '4px',
                          background: 'rgba(255,255,255,0.04)',
                        }}>
                          📍 {anomaly.zone_id}
                        </span>
                      )}
                      <span style={{
                        fontSize: '10px', color: 'var(--text-muted)',
                        marginLeft: 'auto',
                      }}>
                        {fmt.time(anomaly.detected_at)}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       MAIN DASHBOARD
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const Dashboard = () => {
      const [sseStatus, setSseStatus] = React.useState("CONNECTING");
      const [metrics, setMetrics] = React.useState(null);
      const [anomalies, setAnomalies] = React.useState([]);
      const [history, setHistory] = React.useState([]);
      const [lastUpdate, setLastUpdate] = React.useState(null);
      const [error, setError] = React.useState(null);

      /* ── SSE Connection ── */
      React.useEffect(() => {
        let es = null;
        let reconnectDelay = 1000;
        let reconnectTimer = null;
        let staleTimer = null;

        const connect = () => {
          setSseStatus("CONNECTING");
          es = new EventSource(`${window.API_BASE}/stores/${window.STORE_ID}/stream`);

          es.onopen = () => {
            setSseStatus("LIVE");
            reconnectDelay = 1000;
            setError(null);
          };

          es.onmessage = (e) => {
            try {
              const data = JSON.parse(e.data);
              if (data.error) { setError(data.error); return; }
              setMetrics(data);
              setError(null);
              setLastUpdate(fmt.time(data.as_of));

              clearTimeout(staleTimer);
              staleTimer = setTimeout(() => { setSseStatus("STALE"); }, 15000);

              setHistory(prev => [
                ...prev.slice(-29),
                { t: fmt.time(data.as_of), visitors: data.unique_visitors }
              ]);
            } catch (err) {
              setError("Parse error: " + err.message);
            }
          };

          es.onerror = () => {
            es.close();
            setSseStatus("RECONNECTING…");
            reconnectTimer = setTimeout(() => {
              reconnectDelay = Math.min(reconnectDelay * 2, 30000);
              connect();
            }, reconnectDelay);
          };
        };

        connect();

        return () => {
          if (es) es.close();
          if (reconnectTimer) clearTimeout(reconnectTimer);
          if (staleTimer) clearTimeout(staleTimer);
        };
      }, []);

      /* ── Fallback Polling ── */
      React.useEffect(() => {
        const poll = async () => {
          try {
            const r = await fetch(`${window.API_BASE}/stores/${window.STORE_ID}/metrics`);
            if (!r.ok) return;
            const data = await r.json();
            if (sseStatus !== "LIVE") {
              setMetrics(data);
              setLastUpdate(fmt.time(data.as_of));
              setHistory(prev => [
                ...prev.slice(-29),
                { t: fmt.time(data.as_of), visitors: data.unique_visitors }
              ]);
            }
          } catch (e) { /* silent */ }
        };
        const id = setInterval(poll, 5000);
        return () => clearInterval(id);
      }, [sseStatus]);

      /* ── Anomaly Poll ── */
      React.useEffect(() => {
        const poll = async () => {
          try {
            const r = await fetch(`${window.API_BASE}/stores/${window.STORE_ID}/anomalies`);
            const d = await r.json();
            setAnomalies(d.anomalies || []);
          } catch (e) { console.error("Anomaly fetch error", e); }
        };
        poll();
        const id = setInterval(poll, 15000);
        return () => clearInterval(id);
      }, []);

      return (
        <div className="dashboard-wrap" style={{
          maxWidth: '1440px',
          margin: '0 auto',
          padding: '16px 28px 40px',
        }}>
          {/* Global error banner */}
          {error && (
            <div style={{
              padding: '10px 16px',
              borderRadius: '10px',
              background: 'rgba(244,63,94,0.08)',
              border: '1px solid rgba(244,63,94,0.2)',
              color: 'var(--rose)',
              fontSize: '13px',
              marginBottom: '16px',
              display: 'flex', alignItems: 'center', gap: '8px',
            }}>
              <span>⚠</span> {error}
            </div>
          )}

          <Header storeId={window.STORE_ID} status={sseStatus} lastUpdate={lastUpdate} />

          {/* KPI Cards */}
          <KPIRow metrics={metrics} />

          {/* Main Content: Chart + Funnel */}
          <div className="main-grid" style={{
            display: 'grid',
            gridTemplateColumns: '3fr 2fr',
            gap: '16px',
            marginBottom: '20px',
          }}>
            <VisitorTrendChart history={history} />
            <ConversionFunnel storeId={window.STORE_ID} apiBase={window.API_BASE} />
          </div>

          {/* Bottom: Heatmap + Anomalies */}
          <div className="bottom-grid" style={{
            display: 'grid',
            gridTemplateColumns: '3fr 2fr',
            gap: '16px',
          }}>
            <ZoneHeatmap storeId={window.STORE_ID} apiBase={window.API_BASE} />
            <AnomalyFeed anomalies={anomalies} />
          </div>

          {/* Footer */}
          <div style={{
            marginTop: '32px',
            paddingTop: '16px',
            borderTop: '1px solid var(--glass-border)',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            fontSize: '11px',
            color: 'var(--text-muted)',
          }}>
            <span>Store Intelligence Dashboard v2.0</span>
            <span>Powered by ATLAS Analytics</span>
          </div>
        </div>
      );
    };

    /* ── Mount ── */
    ReactDOM.render(<Dashboard />, document.getElementById("root"));
  </script>
</body>
</html>
